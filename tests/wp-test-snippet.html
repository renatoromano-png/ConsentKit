<!--
  ConsentKit — Snippet di test prior blocking PER WORDPRESS
  ----------------------------------------------------------------------------
  Come usarlo su lacasadigiusy (dopo aver installato e attivato il plugin):
   1. Crea una pagina nuova (es. "Test cookie"), impostala come bozza/privata.
   2. Aggiungi un blocco "HTML personalizzato" (Custom HTML).
   3. Incolla TUTTO questo contenuto nel blocco.
   4. Pubblica/anteprima la pagina in finestra anonima.
   5. Il banner di ConsentKit (fornito dal plugin) deve comparire da solo.
   6. Verifica: prima di scegliere i tag sono "spenti"; dopo "Accetta" si
      accendono; dopo "Rifiuta"/X restano spenti.

  NB: NON serve includere consentkit.js né ckConfig: li inietta il plugin.
      Questi sono solo tag FINTI bloccati col pattern di prior blocking.
-->

<div style="border:1px solid #e5e7eb;border-radius:8px;padding:16px;font-family:system-ui,sans-serif;max-width:560px">
  <h3 style="margin-top:0">🧪 Test prior blocking ConsentKit</h3>
  <p style="font-size:14px;color:#374151">Stato dei tag di prova (si aggiorna ogni mezzo secondo):</p>
  <ul style="font-size:14px;line-height:1.9">
    <li>Analytics: <strong id="ckt-analytics" style="color:#991b1b">spento</strong></li>
    <li>Marketing: <strong id="ckt-marketing" style="color:#991b1b">spento</strong></li>
    <li>Preferenze: <strong id="ckt-preferences" style="color:#991b1b">spento</strong></li>
  </ul>
  <p style="font-size:13px;color:#6b7280">Clicca l'icona 🍪 in basso a sinistra per riaprire le preferenze.</p>
</div>

<!-- Tag FINTI bloccati: il plugin li attiva solo dopo l'opt-in della categoria -->
<script type="text/plain" data-ck-category="analytics">
  window.__ckTest = window.__ckTest || {};
  window.__ckTest.analytics = true;
  console.log('[TEST] tag ANALYTICS attivato');
</script>
<script type="text/plain" data-ck-category="marketing">
  window.__ckTest = window.__ckTest || {};
  window.__ckTest.marketing = true;
  console.log('[TEST] tag MARKETING attivato');
</script>
<script type="text/plain" data-ck-category="preferences">
  window.__ckTest = window.__ckTest || {};
  window.__ckTest.preferences = true;
  console.log('[TEST] tag PREFERENZE attivato');
</script>

<script>
(function () {
  function paint(id, on) {
    var e = document.getElementById(id);
    if (!e) return;
    e.textContent = on ? 'ACCESO ✅' : 'spento';
    e.style.color = on ? '#166534' : '#991b1b';
  }
  setInterval(function () {
    var t = window.__ckTest || {};
    paint('ckt-analytics', !!t.analytics);
    paint('ckt-marketing', !!t.marketing);
    paint('ckt-preferences', !!t.preferences);
  }, 500);
})();
</script>
